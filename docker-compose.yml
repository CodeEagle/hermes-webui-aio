version: '3.8'
services:
  hermes:
    build: ./hermes
    container_name: hermes
    restart: unless-stopped
    ports:
      - "5005:5005"

  hermes-webui:
    build: ./hermes-webui
    container_name: hermes-webui
    restart: unless-stopped
    depends_on:
      - hermes
    environment:
      - HERMES_WEBUI_AGENT_DIR=/opt/hermes-agent
      - HERMES_AGENT_URL=http://hermes:5005
    volumes:
      - ./hermes:/opt/hermes-agent:ro
    ports:
      - "8787:8787"
