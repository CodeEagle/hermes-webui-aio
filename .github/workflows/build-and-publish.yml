name: Build and Publish

on:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hermes image
        uses: docker/build-push-action@v4
        with:
          context: ./hermes
          push: true
          tags: |
            ghcr.io/CodeEagle/hermes-webui-aio-hermes:main

      - name: Build and push hermes-webui image
        uses: docker/build-push-action@v4
        with:
          context: ./hermes-webui
          push: true
          tags: |
            ghcr.io/CodeEagle/hermes-webui-aio-webui:main

